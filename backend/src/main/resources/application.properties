spring.application.name=planno-tasks-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dash_api}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${PORT:8080}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

api.security.token.secret=${JWT_SECRET:}
api.security.token.issuer=${JWT_ISSUER:planno-tasks-api}
api.security.token.expiration-hours=${JWT_EXPIRATION_HOURS:2}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.security.production=${APP_SECURITY_PRODUCTION:false}
app.security.max-upload-size-bytes=${MAX_UPLOAD_SIZE_BYTES:10485760}

app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@planno.local}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

app.mercado-pago.enabled=${MERCADO_PAGO_ENABLED:false}
app.mercado-pago.access-token=${MERCADO_PAGO_ACCESS_TOKEN:}
app.mercado-pago.api-base-url=${MERCADO_PAGO_API_BASE_URL:https://api.mercadopago.com}
app.mercado-pago.currency-id=${MERCADO_PAGO_CURRENCY_ID:BRL}
app.mercado-pago.webhook-secret=${MERCADO_PAGO_WEBHOOK_SECRET:}
app.mercado-pago.success-url=${MERCADO_PAGO_SUCCESS_URL:http://localhost:4200/payments?status=success}
app.mercado-pago.pending-url=${MERCADO_PAGO_PENDING_URL:http://localhost:4200/payments?status=pending}
app.mercado-pago.failure-url=${MERCADO_PAGO_FAILURE_URL:http://localhost:4200/payments?status=failure}
app.mercado-pago.subscription-back-url=${MERCADO_PAGO_SUBSCRIPTION_BACK_URL:http://localhost:4200/subscriptions}
app.mercado-pago.notification-url=${MERCADO_PAGO_NOTIFICATION_URL:}

app.platform-billing.plan-code=${PLATFORM_PLAN_CODE:planno-tasks-pro-monthly}
app.platform-billing.plan-name=${PLATFORM_PLAN_NAME:Planno Tasks Pro}
app.platform-billing.monthly-price=${PLATFORM_MONTHLY_PRICE:39.90}
app.platform-billing.currency-id=${PLATFORM_CURRENCY_ID:BRL}
app.platform-billing.admin-tenant-slug=${PLATFORM_BILLING_ADMIN_TENANT_SLUG:}
app.platform-billing.manage-url=${PLATFORM_BILLING_MANAGE_URL:http://localhost:4200/workspace-plan}
app.platform-billing.notification-url=${PLATFORM_BILLING_NOTIFICATION_URL:http://localhost:8080/api/platform-billing/webhooks/mercado-pago}

app.google-drive.enabled=${GOOGLE_DRIVE_ENABLED:false}
app.google-drive.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
app.google-drive.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
app.google-drive.redirect-uri=${GOOGLE_DRIVE_REDIRECT_URI:http://localhost:8080/api/integrations/google-drive/callback}
app.google-drive.auth-base-url=${GOOGLE_DRIVE_AUTH_BASE_URL:https://accounts.google.com/o/oauth2/v2/auth}
app.google-drive.root-folder-id=${GOOGLE_DRIVE_ROOT_FOLDER_ID:root}
app.google-drive.token-uri=${GOOGLE_DRIVE_TOKEN_URI:https://oauth2.googleapis.com/token}
app.google-drive.userinfo-uri=${GOOGLE_DRIVE_USERINFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
app.google-drive.revoke-uri=${GOOGLE_DRIVE_REVOKE_URI:https://oauth2.googleapis.com/revoke}
app.google-drive.api-base-url=${GOOGLE_DRIVE_API_BASE_URL:https://www.googleapis.com}
app.google-drive.scopes=${GOOGLE_DRIVE_SCOPES:openid,email,profile,https://www.googleapis.com/auth/drive}
app.google-drive.frontend-success-url=${GOOGLE_DRIVE_FRONTEND_SUCCESS_URL:http://localhost:4200/documents?googleDrive=connected}
app.google-drive.frontend-error-url=${GOOGLE_DRIVE_FRONTEND_ERROR_URL:http://localhost:4200/documents?googleDrive=error}

app.google-calendar.enabled=${GOOGLE_CALENDAR_ENABLED:false}
app.google-calendar.client-id=${GOOGLE_CALENDAR_CLIENT_ID:${GOOGLE_DRIVE_CLIENT_ID:}}
app.google-calendar.client-secret=${GOOGLE_CALENDAR_CLIENT_SECRET:${GOOGLE_DRIVE_CLIENT_SECRET:}}
app.google-calendar.redirect-uri=${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:8080/api/integrations/google-calendar/callback}
app.google-calendar.auth-base-url=${GOOGLE_CALENDAR_AUTH_BASE_URL:https://accounts.google.com/o/oauth2/v2/auth}
app.google-calendar.token-uri=${GOOGLE_CALENDAR_TOKEN_URI:https://oauth2.googleapis.com/token}
app.google-calendar.userinfo-uri=${GOOGLE_CALENDAR_USERINFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
app.google-calendar.revoke-uri=${GOOGLE_CALENDAR_REVOKE_URI:https://oauth2.googleapis.com/revoke}
app.google-calendar.api-base-url=${GOOGLE_CALENDAR_API_BASE_URL:https://www.googleapis.com}
app.google-calendar.default-calendar-id=${GOOGLE_CALENDAR_DEFAULT_CALENDAR_ID:primary}
app.google-calendar.scopes=${GOOGLE_CALENDAR_SCOPES:openid,email,profile,https://www.googleapis.com/auth/calendar}
app.google-calendar.frontend-success-url=${GOOGLE_CALENDAR_FRONTEND_SUCCESS_URL:http://localhost:4200/calendar?googleCalendar=connected}
app.google-calendar.frontend-error-url=${GOOGLE_CALENDAR_FRONTEND_ERROR_URL:http://localhost:4200/calendar?googleCalendar=error}

springdoc.api-docs.enabled=${OPENAPI_ENABLED:true}
springdoc.swagger-ui.enabled=${OPENAPI_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-match=/api/**

