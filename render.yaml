services:
  - type: web
    name: planno-task-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: APP_SECURITY_PRODUCTION
        value: "true"
      - key: PORT
        value: "8080"
      - key: DB_URL
        value: jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require
      - key: DB_USERNAME
        value: postgres.fxhqxjwhwdefmsokwrqk
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: planno-task-api
      - key: JWT_EXPIRATION_HOURS
        value: "8"
      - key: CORS_ALLOWED_ORIGINS
        value: https://planno-task-web.onrender.com
      - key: OPENAPI_ENABLED
        value: "true"
      - key: MERCADO_PAGO_ENABLED
        value: "false"
      - key: GOOGLE_DRIVE_ENABLED
        value: "false"
      - key: GOOGLE_CALENDAR_ENABLED
        value: "false"
      - key: MAIL_ENABLED
        value: "false"

  - type: web
    name: planno-task-web
    runtime: static
    branch: main
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist/frontend/browser
    autoDeployTrigger: commit
    envVars:
      - key: PLANNO_API_BASE_URL
        value: https://planno-task-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
