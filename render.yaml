services:
  - type: web
    name: planno-api
    runtime: docker
    plan: free
    region: virginia
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: planno-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: JPA_SHOW_SQL
        value: "false"
      - key: MERCADO_PAGO_ENABLED
        value: "false"
      - key: GOOGLE_DRIVE_ENABLED
        value: "false"
      - key: GOOGLE_CALENDAR_ENABLED
        value: "false"
      - key: PLATFORM_BILLING_ADMIN_TENANT_SLUG
        sync: false
    buildFilter:
      paths:
        - src/**
        - pom.xml
        - mvnw
        - .mvn/**
        - Dockerfile
        - render.yaml
  - type: web
    name: planno-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/frontend/browser
    autoDeployTrigger: commit
    envVars:
      - key: PLANNO_API_BASE_URL
        fromService:
          type: web
          name: planno-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
