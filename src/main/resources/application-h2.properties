spring.datasource.url=jdbc:h2:file:./data/planno-tasks;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

spring.flyway.enabled=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.platform-billing.admin-tenant-slug=planno-local
app.mercado-pago.enabled=false
app.google-drive.enabled=false
app.google-calendar.enabled=false

logging.level.org.hibernate.SQL=warn
